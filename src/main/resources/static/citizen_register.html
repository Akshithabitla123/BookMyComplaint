<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complaint Escalation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Register Yourself</h2>

    <input type="text" id="userName" placeholder="Username"/>
    <input type="email" id="email" placeholder="Email"/>
    <input type="password" id="pass" placeholder="Password"/>

    <input type="hidden" id="role" value="CITIZEN"/>

    <div class="buttons">
        <button  onclick="register()">Register</button>
    </div>


    <p class="back" onclick="goBack()">Back to Home</p>

</div>

<script>
    function register(){
        const userName=document.getElementById("userName").value;
        const email=document.getElementById("email").value;
        const pass=document.getElementById("pass").value;

        if(!userName || !email || !pass){alert("All fields are required");
                return;
        }
        fetch("http://localhost:8080/users", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userName: userName,
                email: email,
                pass: pass,
                role: "CITIZEN"
            })
        })
        .then(response => {
            if (response.ok) {
                alert("Registration successful");
                window.location.href = "citizen_dashboard.html";
            } else {
                return response.json().then(data=>{
                    alert(data.error || "Registration failed");
                });
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("Server error");
        });
    }

    function goBack(){
        window.location.href="index.html";
    }
</script>


</body>
</html>
