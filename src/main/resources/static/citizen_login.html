<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Citizen Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>Citizen Login Page</h2>

    <input  type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <div class="buttons">
        <button onclick="login()">Login</button>
    </div>


    <p class="back" onclick="register()">New user? Register</p>
    <p class="back" onclick="back()">Back To Home</p>
</div>
<script>
    function login(){
        const email=document.getElementById("email").value;
        const pass=document.getElementById("pass").value;
        if(!email || !pass){
            alert("Credentials missing");
<!--            return;-->
        }
        fetch("http://localhost:8080/users/user/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    pass: pass
                })
            })
            .then(response => response.json())
            .then(user => {
                if (!user || !user.userId) {
                    alert("Invalid credentials");
                    return;
                }
                localStorage.setItem("loggedInUser",JSON.stringify(user));
                alert("Login successful");
                window.location.href="citizen_dashboard.html";

            })
            .catch(error => {
                console.error("Error:", error);
                alert("Server error");
            });
    }

    function register(){
        window.location.href="citizen_register.html";
    }
    function back(){
        window.location.href="index.html";
    }
</script>




</body>
</html>
