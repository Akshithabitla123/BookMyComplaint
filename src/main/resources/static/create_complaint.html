<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Complaint</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>Want to add complaint?</h2>
    <input type="text" id="title" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input type="text" id="area" placeholder="Area">

    <div class="priority-group">
        <label for="priority">How Urgent is this? (If its not that urgent, please select low or medium)</label>
        <select id="priority">
        <option value="LOW">Low - can wait for 2-3 days</option>
        <option value="MEDIUM" selected>Medium - can wait for 1-2 days</option>
        <option value="HIGH">High</option>
    </select>
    </div>
    <div class="buttons">
        <button onclick="submit()">Submit</button>
    </div>

    <p class="back" onclick="back()">Go back</p>
</div>

<script>

    const user=JSON.parse(localStorage.getItem("loggedInUser"));
    if(!user){
        alert("Please login first");
        window.location.href="citizen_login.html";
    }
function submit(){

    const title=document.getElementById("title").value;
    const description=document.getElementById("description").value;
    const area=document.getElementById("area").value;
    const priority=document.getElementById("priority").value;

    if(!title.trim() || !description.trim() || !area.trim()){
        alert("Required fields missing");
        return;
    }

    fetch(`http://localhost:8080/complaints/user/${user.userId}`,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            title:title,
            description:description,
            area:area,
            priority:priority
        })
    })
    .then(response=>{
        if(response.ok){
            alert("Complaint submitted successfully");
            window.location.href="citizen_dashboard.html";
        }else{
            return response.json().then(data=>{
                const message=data.error || "Faled to submit complaint";
                if(data.error && data.error.includes("maximum limit")){
                    alert(message+"\n\nGo to 'View My Complaints' to check the status of your existing complaints.");
                }else{
                    alert(message);
                }
            });
        }
    })
    .catch(error=>{
        console.error("Error:", error);
        alert("Server error");
    });


    }
    function back(){
        window.location.href="citizen_dashboard.html";
    }
</script>
</body>
</html>
