<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Complaint</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>Want to add complaint?</h2>
    <input type="text" id="title" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input type="text" id="area" placeholder="Area">

    <div class="buttons">
        <button onclick="submit()">Submit</button>
    </div>

    <p class="back" onclick="back()">Go back</p>
</div>

<script>

    const user=JSON.parse(localStorage.getItem("loggedInUser"));
    if(!user){
        alert("Please login first");
        window.location.href="citizen_login.html";
    }
function submit(){

    const title=document.getElementById("title").value;
    const description=document.getElementById("description").value;
    const area=document.getElementById("area").value;

    if(!title || !description || !area){
        alert("Required fields missing");
        return;
    }

    fetch(`http://localhost:8080/complaints/user/${user.userId}`,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            title:title,
            description:description,
            area:area
        })
    })
    .then(response=>{
        if(response.ok){
            alert("Complaint submitted successfully");
            window.location.href="citizen_dashboard.html";
        }else{
            alert("Failed to submit complaint");
            window.location.href="create_complaint.html";
        }
    })
    .catch(error=>{
        console.error("Error:", error);
        alert("Server error");
    });


    }
    function back(){
        window.location.href="citizen_dashboard.html";
    }
</script>
</body>
</html>
